<script>
const keys=['arquitetura','primitivos','taxonomias','ecologia','autoensino','expansao'];
function show(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  const el=document.getElementById('view-'+v);
  if(el){el.classList.add('active');el.style.animation='none';el.offsetHeight;el.style.animation=''}
  const idx=keys.indexOf(v);
  if(idx>=0)document.querySelectorAll('.tab')[idx].classList.add('active');
}
document.querySelectorAll('.tab').forEach((el,i)=>{el.onclick=()=>show(keys[i])});
function tip(e,text){
  const t=document.getElementById('tooltip');
  t.textContent=text;t.style.opacity='1';
  t.style.left=Math.min(e.clientX+12,window.innerWidth-320)+'px';
  t.style.top=(e.clientY-10)+'px';
  setTimeout(()=>t.style.opacity='0',3500);
}
document.addEventListener('click',e=>{if(!e.target.closest('.expandable'))document.getElementById('tooltip').style.opacity='0'});
</script>
