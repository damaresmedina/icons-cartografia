<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Damares Medina — Ontologia Integrada · Cartografia da Litigância do Estado Brasileiro</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c14;
  --bg2: #12121e;
  --bg3: #1a1a2e;
  --bg4: #222236;
  --text: #d8d8e4;
  --text2: #8888a0;
  --text3: #606078;
  --border: #1e1e32;
  --border2: #2a2a44;
  --accent: #4a9e8e;
  --t: #404060;

  --amber: #c08020;
  --amber-bg: rgba(192,128,32,0.08);
  --amber-stroke: rgba(192,128,32,0.35);
  --amber-text: #e8c060;
  --blue: #2070b8;
  --blue-bg: rgba(32,112,184,0.08);
  --blue-stroke: rgba(32,112,184,0.35);
  --blue-text: #60a8e8;
  --teal: #208868;
  --teal-bg: rgba(32,136,104,0.08);
  --teal-stroke: rgba(32,136,104,0.35);
  --teal-text: #50d0a0;
  --purple: #7068c8;
  --purple-bg: rgba(112,104,200,0.08);
  --purple-stroke: rgba(112,104,200,0.35);
  --purple-text: #a8a0f0;
  --coral: #c05030;
  --coral-bg: rgba(192,80,48,0.08);
  --coral-stroke: rgba(192,80,48,0.35);
  --coral-text: #e88060;
  --red: #a83030;
  --red-bg: rgba(168,48,48,0.08);
  --red-stroke: rgba(168,48,48,0.35);
  --red-text: #e06060;
  --gray: #505068;
  --gray-bg: rgba(80,80,104,0.06);
  --gray-stroke: rgba(80,80,104,0.3);
  --gray-text: #9090a8;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

.page {
  max-width: 740px;
  margin: 0 auto;
  padding: 0 24px 60px;
}

/* ── HEADER ── */
.hero {
  text-align: center;
  padding: 56px 20px 44px;
  position: relative;
}
.hero::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.hero-author {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 24px;
}
.hero-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 32px;
  font-weight: 400;
  color: #fff;
  letter-spacing: 0.5px;
  line-height: 1.25;
  margin-bottom: 12px;
}
.hero-title em {
  font-style: italic;
  font-weight: 400;
  color: var(--text);
}
.hero-sub {
  font-size: 13px;
  font-weight: 300;
  color: var(--text2);
  letter-spacing: 0.3px;
  line-height: 1.6;
  max-width: 440px;
  margin: 0 auto 20px;
}
.hero-meta {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text3);
}
.hero-meta span { position: relative; }
.hero-meta .dot {
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--text3);
  display: inline-block;
}

/* ── TABS ── */
.nav {
  display: flex;
  gap: 4px;
  margin: 32px 0 24px;
  padding: 4px;
  background: var(--bg2);
  border-radius: 12px;
  border: 1px solid var(--border);
}
.nav-item {
  flex: 1;
  padding: 10px 8px;
  border-radius: 9px;
  font-size: 11px;
  font-weight: 400;
  cursor: pointer;
  color: var(--text2);
  text-align: center;
  transition: all 0.2s ease;
  user-select: none;
  letter-spacing: 0.2px;
}
.nav-item:hover {
  color: var(--text);
  background: rgba(255,255,255,0.03);
}
.nav-item.active {
  background: var(--bg3);
  color: #fff;
  font-weight: 500;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}

/* ── VIEWS ── */
.view { display: none; animation: fadeIn 0.3s ease; }
.view.active { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.view-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 28px 20px;
  position: relative;
  overflow: hidden;
}
.view-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
}

/* ── SVG ── */
svg { width: 100%; height: auto; display: block; }

.c-amber rect { fill: var(--amber-bg); stroke: var(--amber-stroke); }
.c-amber text { fill: var(--amber-text); }
.c-blue rect { fill: var(--blue-bg); stroke: var(--blue-stroke); }
.c-blue text { fill: var(--blue-text); }
.c-teal rect { fill: var(--teal-bg); stroke: var(--teal-stroke); }
.c-teal text { fill: var(--teal-text); }
.c-purple rect { fill: var(--purple-bg); stroke: var(--purple-stroke); }
.c-purple text { fill: var(--purple-text); }
.c-coral rect { fill: var(--coral-bg); stroke: var(--coral-stroke); }
.c-coral text { fill: var(--coral-text); }
.c-red rect { fill: var(--red-bg); stroke: var(--red-stroke); }
.c-red text { fill: var(--red-text); }
.c-gray rect { fill: var(--gray-bg); stroke: var(--gray-stroke); }
.c-gray text { fill: var(--gray-text); }

.th { font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; }
.ts { font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 400; }

.expandable { cursor: pointer; }
.expandable:hover rect { filter: brightness(1.3); }

/* ── TOOLTIP ── */
#tooltip {
  position: fixed;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 11px;
  font-family: 'Inter', sans-serif;
  color: var(--text);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  max-width: 300px;
  line-height: 1.6;
  z-index: 100;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
}

/* ── FOOTER ── */
.footer {
  text-align: center;
  padding: 40px 20px 0;
  border-top: 1px solid var(--border);
  margin-top: 40px;
}
.footer p {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1px;
  line-height: 2;
}

/* ── RESPONSIVE ── */
@media (max-width: 520px) {
  .hero { padding: 40px 12px 32px; }
  .hero-title { font-size: 24px; }
  .hero-sub { font-size: 12px; }
  .nav { gap: 2px; padding: 3px; }
  .nav-item { padding: 8px 4px; font-size: 9.5px; }
  .view-card { padding: 16px 12px; border-radius: 12px; }
  .th { font-size: 10px; }
  .ts { font-size: 8px; }
  .page { padding: 0 12px 40px; }
  .hero-meta { gap: 12px; font-size: 8px; }
}
</style>
</head>

<script>
const keys = ['overview','primitivos','sistemas','poliedro','ciclo','expansao'];

function show(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('view-' + v);
  if (el) { el.classList.add('active'); el.style.animation = 'none'; el.offsetHeight; el.style.animation = ''; }
  const idx = keys.indexOf(v);
  if (idx >= 0) document.querySelectorAll('.nav-item')[idx].classList.add('active');
}

document.querySelectorAll('.nav-item').forEach((el, i) => {
  el.onclick = () => show(keys[i]);
});

function tip(e, text) {
  const t = document.getElementById('tooltip');
  t.textContent = text;
  t.style.opacity = '1';
  t.style.left = Math.min(e.clientX + 12, window.innerWidth - 320) + 'px';
  t.style.top = (e.clientY - 10) + 'px';
  setTimeout(() => t.style.opacity = '0', 3500);
}

document.addEventListener('click', e => {
  if (!e.target.closest('.expandable')) document.getElementById('tooltip').style.opacity = '0';
});
</script>
