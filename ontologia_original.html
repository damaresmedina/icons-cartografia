<script>
function show(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  document.querySelectorAll('.tab').forEach(el => {
    if (el.textContent.toLowerCase().replace(/\s+/g,'').includes(v.replace(/\s+/g,'').substring(0,4))) el.classList.add('active');
  });
}
const labels = {
  'overview':'Visão geral','primitivos':'Primitivos','sistemas':'Dois sistemas',
  'poliedro':'Poliedro','ciclo':'Ciclo','expansao':'Expansão'
};
document.querySelectorAll('.tab').forEach((el,i) => {
  const keys = Object.keys(labels);
  el.onclick = () => show(keys[i]);
});
function tip(e, text) {
  const t = document.getElementById('tooltip');
  t.textContent = text;
  t.style.opacity = '1';
  t.style.left = (e.clientX + 12) + 'px';
  t.style.top = (e.clientY - 10) + 'px';
  setTimeout(() => t.style.opacity = '0', 3000);
}
document.addEventListener('click', e => {
  if (!e.target.closest('.expandable')) document.getElementById('tooltip').style.opacity = '0';
});
</script>
