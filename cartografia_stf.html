<title>CRFB/1988 · STF · Cartografia de Decisões</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;--surface:#161616;--surface2:#1e1e1e;--border:#2a2a2a;
  --text:#e8e8e8;--muted:#888;--accent:#6fa8dc;
  --t1:#e8523a;--t2:#5b9bd5;--t3:#70ad47;--t4:#9b59b6;
  --t5:#e67e22;--t6:#f1c40f;--t7:#1abc9c;--t8:#e91e63;
  --t9:#607d8b;--t10:#795548;
}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:12px;overflow:hidden;height:100vh;display:flex;flex-direction:column}

/* TOP BAR */
#topbar{
  display:flex;align-items:center;gap:12px;padding:8px 16px;
  border-bottom:1px solid var(--border);background:var(--surface);
  flex-shrink:0;z-index:100;flex-wrap:wrap;
}
#topbar .brand{font-size:11px;color:var(--muted);letter-spacing:.08em;white-space:nowrap}
#topbar .brand span{color:var(--text);font-weight:bold}
.btn{
  background:transparent;border:1px solid var(--border);color:var(--muted);
  padding:4px 10px;border-radius:3px;cursor:pointer;font-family:inherit;font-size:11px;
  transition:all .15s;white-space:nowrap;
}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.active{border-color:var(--accent);color:var(--accent);background:rgba(111,168,220,.12)}
#search{
  background:transparent;border:1px solid var(--border);color:var(--text);
  padding:4px 10px;border-radius:3px;font-family:inherit;font-size:11px;width:160px;
  outline:none;
}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--muted)}

/* MAIN AREA */
#main{display:flex;flex:1;overflow:hidden}

/* CHART AREA */
#chartWrap{
  flex:1;overflow-x:auto;overflow-y:hidden;position:relative;
  background:var(--bg);
}
#canvas{display:block;cursor:crosshair}

/* TOOLTIP */
#tooltip{
  position:fixed;background:rgba(14,14,14,.97);border:1px solid var(--border);
  border-radius:4px;padding:14px 16px;width:460px;max-height:70vh;overflow-y:auto;
  display:none;z-index:500;pointer-events:auto;font-size:11px;line-height:1.6;
}
#tooltip h2{font-size:14px;color:var(--text);margin-bottom:2px;font-family:inherit}
#tooltip .sub{color:var(--muted);font-size:10px;margin-bottom:10px}
#tooltip .stats{display:flex;gap:16px;margin-bottom:12px;flex-wrap:wrap}
#tooltip .stat{color:var(--muted)}
#tooltip .stat strong{color:var(--text)}
#tooltip .disp-section{margin-bottom:10px}
#tooltip .disp-title{color:var(--accent);font-size:10px;letter-spacing:.06em;margin-bottom:5px;border-bottom:1px solid var(--border);padding-bottom:3px}
.tag{
  display:inline-block;padding:1px 5px;border-radius:2px;font-size:9px;
  font-weight:bold;margin:1px;cursor:pointer;border:1px solid transparent;
  white-space:nowrap;
}
.tag:hover{opacity:.8}
.tag-ADI{background:#1a0a08;border-color:#e8523a;color:#e8523a}
.tag-RE,.tag-ARE{background:#081520;border-color:#5b9bd5;color:#5b9bd5}
.tag-HC,.tag-RHC{background:#080f15;border-color:#4fc3f7;color:#4fc3f7}
.tag-MS{background:#0e1a0a;border-color:#70ad47;color:#70ad47}
.tag-ADPF{background:#12080f;border-color:#ce93d8;color:#ce93d8}
.tag-Súmula{background:#181306;border-color:#f1c40f;color:#f1c40f}
.tag-SV{background:#0f1a09;border-color:#a5d6a7;color:#a5d6a7;font-size:9px}
.tag-Rcl{background:#0d0d0d;border-color:#607d8b;color:#78909c}
.tag-default{background:#111;border-color:#444;color:#aaa}
#tooltip .more{color:var(--muted);font-size:9px;margin-top:3px}
#tooltip .close-btn{position:sticky;top:0;float:right;background:var(--surface2);border:1px solid var(--border);color:var(--muted);cursor:pointer;padding:2px 6px;font-family:inherit;font-size:10px;border-radius:2px}
#tooltip .close-btn:hover{color:var(--text)}

/* BOTTOM BAR */
#bottombar{
  display:flex;align-items:center;gap:20px;padding:5px 16px;
  border-top:1px solid var(--border);background:var(--surface);
  flex-shrink:0;font-size:10px;color:var(--muted);
}
#bottombar .legend{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.leg-item{display:flex;align-items:center;gap:4px}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* SCROLLBAR */
#chartWrap::-webkit-scrollbar{height:5px}
#chartWrap::-webkit-scrollbar-track{background:var(--bg)}
#chartWrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>

:"Luiz Fux","dj":"5-8-2015","e":""},{"id":8715,"t":"ADI","p":"ADI 2.047","r":"","dj":"3-11-1999","e":""}]}}},{"n":250,"ti":"IX","tn":"Disposições Gerais","tot":1,"ds":{"caput":{"c":1,"d":[{"id":8716,"t":"ADI","p":"ADI 2.238","r":"Alexandre de Moraes","dj":"24-6-2020","e":""}]}}}];

// Config
const TITULO_COLORS = {
  'I':'#e8523a','II':'#5b9bd5','III':'#70ad47','IV':'#9b59b6',
  'V':'#e67e22','VI':'#f1c40f','VII':'#1abc9c','VIII':'#e91e63',
  'IX':'#607d8b','X':'#795548',''  :'#555'
};
const TITULO_NAMES = {
  'I':'Princípios Fundamentais','II':'Direitos e Garantias Fundamentais',
  'III':'Organização do Estado','IV':'Organização dos Poderes',
  'V':'Defesa do Estado','VI':'Tributação e Orçamento',
  'VII':'Ordem Econômica','VIII':'Ordem Social',
  'IX':'Disposições Gerais','X':'ADCT',''  :''
};

let mode = 'total';  // total | direto | disps | arvore
let logScale = false;
let searchStr = '';
let hoveredArt = null;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('chartWrap');

// Compute display data
function getData() {
  return RAW.filter(a => {
    if (!searchStr) return true;
    return String(a.n).includes(searchStr);
  });
}

function getHeight(art) {
  let v = 0;
  if (mode === 'total' || mode === 'arvore') {
    v = art.tot;
  } else if (mode === 'direto') {
    const d = art.ds['caput'];
    v = d ? d.c : 0;
  } else if (mode === 'disps') {
    v = Object.values(art.ds).filter(d => d && Object.keys(art.ds).some(k => k !== 'caput')).reduce((s,d)=>s+d.c,0) - (art.ds['caput']?.c||0);
    v = Math.max(0, v);
  }
  return v;
}

// Layout constants
const BAR_W = 14;
const BAR_GAP = 4;
const MARGIN_TOP = 60;
const MARGIN_BOT = 50;
const LABEL_H = 30;

function draw() {
  const arts = getData();
  const W = wrap.clientWidth;
  const H = wrap.clientHeight || 500;
  const totalW = Math.max(W, arts.length * (BAR_W + BAR_GAP) + 80);
  
  canvas.width = totalW;
  canvas.height = H;
  
  ctx.clearRect(0,0,totalW,H);
  ctx.fillStyle = '#0d0d0d';
  ctx.fillRect(0,0,totalW,H);

  const chartH = H - MARGIN_TOP - MARGIN_BOT - LABEL_H;
  
  // Grid lines
  const gridVals = logScale ? [1,5,10,50,100,500,1000] : [100,200,300,400,500,600,700,800];
  const maxVal = Math.max(...arts.map(getHeight), 1);
  
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  ctx.fillStyle = '#333';
  ctx.font = '9px Courier New';
  ctx.textAlign = 'right';
  
  for (const gv of gridVals) {
    if (gv > maxVal * 1.1) continue;
    const y = valToY(gv, maxVal, chartH);
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(totalW, y);
    ctx.stroke();
    ctx.fillText(gv, 52, y + 3);
  }

  // Draw bars
  arts.forEach((art, idx) => {
    const x = 60 + idx * (BAR_W + BAR_GAP);
    const v = getHeight(art);
    if (v <= 0) return;
    
    const barH = Math.max(2, valToY(0, maxVal, chartH) - valToY(v, maxVal, chartH));
    const y = valToY(v, maxVal, chartH);
    
    const color = TITULO_COLORS[art.ti] || '#555';
    const isHover = hoveredArt === art.n;
    
    // Sub-dispositivo markers (small ticks at top)
    if (mode === 'total' || mode === 'disps') {
      const dispKeys = Object.keys(art.ds).filter(k => k !== 'caput');
      const dispColors = ['#fff3','#fff4','#fff5','#fff2'];
      dispKeys.slice(0,8).forEach((dk, di) => {
        const dc = art.ds[dk].c;
        const dy = valToY(dc, maxVal, chartH);
        ctx.fillStyle = 'rgba(255,255,255,0.12)';
        ctx.fillRect(x, dy, BAR_W, valToY(0,maxVal,chartH)-dy);
      });
    }

    // Main bar
    const grad = ctx.createLinearGradient(x, y, x, y + barH);
    grad.addColorStop(0, color + (isHover ? 'ff' : 'dd'));
    grad.addColorStop(1, color + '22');
    ctx.fillStyle = grad;
    ctx.fillRect(x, y, BAR_W, barH);
    
    // Highlight rim
    if (isHover) {
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x, y, BAR_W, barH);
    }

    // Article number label (rotated)
    const labelY = H - MARGIN_BOT;
    ctx.save();
    ctx.translate(x + BAR_W/2, labelY);
    ctx.rotate(-Math.PI/2);
    ctx.fillStyle = isHover ? '#fff' : (v > 50 ? '#888' : '#444');
    ctx.font = isHover ? 'bold 9px Courier New' : '9px Courier New';
    ctx.textAlign = 'right';
    ctx.fillText(art.n, 0, 3);
    ctx.restore();
    
    // Titulo label at very bottom (first of each grupo)
  });

  // Titulo group background strips (top)
  let lastTi = null;
  let groupStart = 0;
  const drawStrip = (from, to, ti) => {
    if (!ti) return;
    const x1 = 60 + from * (BAR_W + BAR_GAP);
    const x2 = 60 + to * (BAR_W + BAR_GAP) + BAR_W;
    ctx.fillStyle = (TITULO_COLORS[ti]||'#555') + '18';
    ctx.fillRect(x1, 0, x2-x1, MARGIN_TOP - 4);
    // Label
    ctx.fillStyle = (TITULO_COLORS[ti]||'#555') + 'cc';
    ctx.font = '9px Courier New';
    ctx.textAlign = 'left';
    const label = TITULO_NAMES[ti] ? TITULO_NAMES[ti].split(' ').slice(0,2).join(' ') : ti;
    ctx.fillText(label, x1 + 4, 12);
  };
  
  arts.forEach((art, idx) => {
    if (art.ti !== lastTi) {
      if (lastTi !== null) drawStrip(groupStart, idx-1, lastTi);
      groupStart = idx;
      lastTi = art.ti;
    }
  });
  if (lastTi !== null) drawStrip(groupStart, arts.length-1, lastTi);

  // Update stats
  document.getElementById('stats-bar').textContent = 
    `Artigos ${arts.length}  ·  Decisões ${RAW.reduce((s,a)=>s+a.tot,0).toLocaleString('pt-BR')}  ·  CRFB/1988 · 1988–2026 · ICONS · PROJUS`;

  // Legend
  buildLegend();
}

function valToY(v, maxVal, chartH) {
  const top = MARGIN_TOP;
  if (v <= 0) return top + chartH;
  if (logScale) {
    const lv = Math.log10(v + 1);
    const lmax = Math.log10(maxVal + 1);
    return top + chartH - (lv / lmax) * chartH;
  }
  return top + chartH - (v / maxVal) * chartH;
}

function buildLegend() {
  const leg = document.getElementById('legend');
  const titulos = [...new Set(RAW.map(a=>a.ti))].filter(Boolean);
  leg.innerHTML = titulos.map(ti => `
    <span class="leg-item">
      <span class="leg-dot" style="background:${TITULO_COLORS[ti]}"></span>
      <span style="color:#555">Tít.${ti}</span>
    </span>
  `).join('');
}

// Mouse interaction
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left + wrap.scrollLeft;
  const arts = getData();
  let found = null;
  arts.forEach((art, idx) => {
    const x = 60 + idx * (BAR_W + BAR_GAP);
    if (mx >= x && mx <= x + BAR_W) found = art;
  });
  if (found?.n !== hoveredArt) {
    hoveredArt = found ? found.n : null;
    draw();
  }
});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left + wrap.scrollLeft;
  const arts = getData();
  let found = null;
  arts.forEach((art, idx) => {
    const x = 60 + idx * (BAR_W + BAR_GAP);
    if (mx >= x && mx <= x + BAR_W) found = art;
  });
  if (found) showTooltip(found, e.clientX, e.clientY);
  else hideTooltip();
});

canvas.addEventListener('mouseleave', () => {
  hoveredArt = null;
  draw();
});

function tagClass(tipo) {
  const t = tipo.replace(/\s+/g,'');
  const known = ['ADI','RE','ARE','HC','RHC','MS','ADPF','Súmula','SV','Rcl'];
  return known.includes(t) ? `tag-${t}` : 'tag-default';
}

function showTooltip(art, cx, cy) {
  const tt = document.getElementById('tooltip');
  const dispKeys = Object.keys(art.ds).sort((a,b) => {
    const order = {'caput':0,'pu':1};
    const oa = order[a] ?? (a.startsWith('inc_') ? 2 : a.startsWith('§') ? 3 : 4);
    const ob = order[b] ?? (b.startsWith('inc_') ? 2 : b.startsWith('§') ? 3 : 4);
    if (oa !== ob) return oa - ob;
    return (art.ds[b]?.c||0) - (art.ds[a]?.c||0);
  });
  
  const caputCount = art.ds['caput']?.c || 0;
  const ndisps = dispKeys.length;

  let html = `
    <h2>Art. ${art.n}º — ${art.tn || ''}</h2>
    <div class="sub">${art.ti ? `Título ${art.ti}` : ''} ${art.ti ? '·' : ''} CRFB/1988</div>
    <div class="stats">
      <div class="stat">Total <strong>${art.tot}</strong></div>
      <div class="stat">Art. direto <strong>${caputCount}</strong></div>
      <div class="stat">Dispositivos <strong>${ndisps}</strong></div>
    </div>
  `;
  
  // Show top dispositivos by count
  const topDisps = dispKeys.sort((a,b) => (art.ds[b]?.c||0)-(art.ds[a]?.c||0)).slice(0,6);
  
  for (const dk of topDisps) {
    const disp = art.ds[dk];
    if (!disp) continue;
    const label = dk === 'caput' ? `Ancoragem direta no artigo (${disp.c})`
                : dk === 'pu'    ? `Parágrafo único — ${disp.c} decisões`
                : dk.startsWith('inc_') ? `Inciso ${dk.replace('inc_','')} — ${disp.c} decisões`
                : dk.startsWith('§')    ? `${dk} — ${disp.c} decisões`
                : dk.startsWith('al_')  ? `Alínea "${dk.replace('al_','')}" — ${disp.c} decisões`
                : `${dk} — ${disp.c} decisões`;
    
    const shown = disp.d.slice(0,6);
    const more = disp.c - shown.length;
    
    html += `<div class="disp-section">
      <div class="disp-title">${label}</div>
      <div>`;
    for (const d of shown) {
      html += `<span class="tag ${tagClass(d.t)}" title="${d.e || ''}">${d.p.split(',')[0].trim().replace(/\s+/g,' ')}</span>`;
    }
    if (more > 0) html += `<span style="color:var(--muted);font-size:9px"> +${more}</span>`;
    html += `</div></div>`;
  }
  
  document.getElementById('tt-content').innerHTML = html;
  
  // Position
  let left = cx + 12;
  let top = cy - 20;
  if (left + 470 > window.innerWidth) left = cx - 475;
  if (top + 400 > window.innerHeight) top = window.innerHeight - 410;
  tt.style.left = left + 'px';
  tt.style.top = Math.max(8, top) + 'px';
  tt.style.display = 'block';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('[id^=btn-]').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-'+m)?.classList.add('active');
  draw();
}

function toggleLog() {
  logScale = !logScale;
  document.getElementById('btn-log').classList.toggle('active', logScale);
  draw();
}

function onSearch(v) {
  searchStr = v.trim();
  draw();
}

function resetView() {
  wrap.scrollLeft = 0;
  searchStr = '';
  document.getElementById('search').value = '';
  draw();
}

// Resize
const ro = new ResizeObserver(() => draw());
ro.observe(wrap);

draw();
</script>
</body>
</html>
